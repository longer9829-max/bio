<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feluve — Рабочий стол</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --win-gray: #c0c0c0;
    --win-dark: #808080;
    --win-darker: #404040;
    --win-light: #dfdfdf;
    --win-white: #ffffff;
    --win-blue: #0a246a;
    --win-title: linear-gradient(90deg, #0a246a 0%, #3a6ea5 100%);
    --win-title-inactive: linear-gradient(90deg, #7a7a7a 0%, #a0a0a0 100%);
    --desktop: #3a6ea5;
  }

  body {
    font-family: 'Tahoma', 'MS Sans Serif', 'Arial', sans-serif;
    font-size: 11px;
    background: var(--desktop);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
    cursor: default;
    -webkit-font-smoothing: none;
  }

  /* CRT scanlines subtle */
  .crt {
    position: fixed; inset: 0; z-index: 9998; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 2px);
  }

  /* Desktop */
  .desktop {
    position: fixed; inset: 0; bottom: 30px;
    background: var(--desktop);
    background-image:
      radial-gradient(circle at 30% 40%, rgba(255,255,255,0.05) 0%, transparent 50%),
      radial-gradient(circle at 70% 70%, rgba(0,0,0,0.1) 0%, transparent 50%);
  }

  /* Desktop Icons */
  .desktop-icon {
    position: absolute;
    width: 72px;
    text-align: center;
    cursor: pointer;
    padding: 4px;
  }
  .desktop-icon:hover .icon-img { filter: brightness(1.1); }
  .desktop-icon.selected .icon-img {
    filter: brightness(0.7) hue-rotate(180deg);
    outline: 1px dotted white;
  }
  .desktop-icon.selected .icon-label {
    background: #0a246a;
    color: white;
  }
  .icon-img {
    width: 32px; height: 32px;
    margin: 0 auto 4px;
    image-rendering: pixelated;
    display: block;
  }
  .icon-label {
    color: white;
    font-size: 11px;
    text-shadow: 1px 1px 0 #000;
    padding: 1px 3px;
    word-wrap: break-word;
    line-height: 1.3;
  }

  /* Window */
  .window {
    position: absolute;
    background: var(--win-gray);
    border-top: 2px solid var(--win-white);
    border-left: 2px solid var(--win-white);
    border-right: 2px solid var(--win-darker);
    border-bottom: 2px solid var(--win-darker);
    box-shadow: 1px 1px 0 #000;
    min-width: 180px;
  }
  .window.active { z-index: 100; }

  .window-title {
    background: var(--win-title);
    color: white;
    padding: 3px 4px;
    font-weight: bold;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: move;
    height: 22px;
  }
  .window.inactive .window-title {
    background: var(--win-title-inactive);
    color: #d0d0d0;
  }
  .window-title-text {
    display: flex;
    align-items: center;
    gap: 4px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .window-title-icon {
    width: 16px; height: 16px;
    image-rendering: pixelated;
    flex-shrink: 0;
  }
  .window-controls {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }
  .window-btn {
    width: 21px; height: 21px;
    background: var(--win-gray);
    border-top: 1px solid var(--win-white);
    border-left: 1px solid var(--win-white);
    border-right: 1px solid var(--win-darker);
    border-bottom: 1px solid var(--win-darker);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: bold;
    cursor: pointer;
    color: black;
    font-family: 'Marlett', 'Tahoma', sans-serif;
    line-height: 1;
  }
  .window-btn:active {
    border-top: 1px solid var(--win-darker);
    border-left: 1px solid var(--win-darker);
    border-right: 1px solid var(--win-white);
    border-bottom: 1px solid var(--win-white);
  }
  .window-btn-close { font-size: 12px; }

  .window-body {
    padding: 4px;
    background: var(--win-gray);
  }

  /* Menu bar */
  .menu-bar {
    background: var(--win-gray);
    border-bottom: 1px solid var(--win-dark);
    padding: 2px 4px;
    display: flex;
    gap: 2px;
  }
  .menu-item {
    padding: 2px 8px;
    cursor: pointer;
    font-size: 11px;
  }
  .menu-item:hover {
    background: var(--win-blue);
    color: white;
  }
  .menu-item u { text-decoration: underline; }

  /* Toolbar */
  .toolbar {
    background: var(--win-gray);
    border-bottom: 1px solid var(--win-dark);
    padding: 3px 4px;
    display: flex;
    gap: 3px;
    align-items: center;
  }
  .toolbar-btn {
    width: 24px; height: 24px;
    background: var(--win-gray);
    border-top: 1px solid var(--win-white);
    border-left: 1px solid var(--win-white);
    border-right: 1px solid var(--win-darker);
    border-bottom: 1px solid var(--win-darker);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
  }
  .toolbar-btn:active {
    border-top: 1px solid var(--win-darker);
    border-left: 1px solid var(--win-darker);
    border-right: 1px solid var(--win-white);
    border-bottom: 1px solid var(--win-white);
  }
  .toolbar-sep {
    width: 2px; height: 22px;
    border-left: 1px solid var(--win-dark);
    border-right: 1px solid var(--win-white);
    margin: 0 2px;
  }
  .address-bar {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 4px;
    background: white;
    border-top: 1px solid var(--win-darker);
    border-left: 1px solid var(--win-darker);
    border-right: 1px solid var(--win-white);
    border-bottom: 1px solid var(--win-white);
    padding: 2px 4px;
    font-size: 11px;
  }
  .address-bar span { color: var(--win-dark); }

  /* Status bar */
  .status-bar {
    background: var(--win-gray);
    border-top: 1px solid var(--win-dark);
    padding: 2px 4px;
    font-size: 11px;
    color: #333;
    display: flex;
    gap: 4px;
  }
  .status-bar-item {
    border-top: 1px solid var(--win-darker);
    border-left: 1px solid var(--win-darker);
    border-right: 1px solid var(--win-white);
    border-bottom: 1px solid var(--win-white);
    padding: 1px 6px;
    flex: 1;
  }

  /* Win Button */
  .win-btn {
    background: var(--win-gray);
    border-top: 2px solid var(--win-white);
    border-left: 2px solid var(--win-white);
    border-right: 2px solid var(--win-darker);
    border-bottom: 2px solid var(--win-darker);
    padding: 4px 14px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .win-btn:active {
    border-top: 2px solid var(--win-darker);
    border-left: 2px solid var(--win-darker);
    border-right: 2px solid var(--win-white);
    border-bottom: 2px solid var(--win-white);
    padding: 5px 13px 3px 15px;
  }
  .win-btn-primary { font-weight: bold; }

  /* Taskbar */
  .taskbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 30px;
    background: var(--win-gray);
    border-top: 2px solid var(--win-white);
    display: flex;
    align-items: center;
    padding: 2px 3px;
    z-index: 9999;
    gap: 3px;
  }
  .start-btn {
    background: var(--win-gray);
    border-top: 2px solid var(--win-white);
    border-left: 2px solid var(--win-white);
    border-right: 2px solid var(--win-darker);
    border-bottom: 2px solid var(--win-darker);
    padding: 2px 6px;
    font-weight: bold;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    height: 24px;
  }
  .start-btn:active, .start-btn.active {
    border-top: 2px solid var(--win-darker);
    border-left: 2px solid var(--win-darker);
    border-right: 2px solid var(--win-white);
    border-bottom: 2px solid var(--win-white);
  }
  .start-logo {
    width: 16px; height: 16px;
  }
  .taskbar-divider {
    width: 2px; height: 24px;
    border-left: 1px solid var(--win-dark);
    border-right: 1px solid var(--win-white);
    margin: 0 2px;
  }
  .taskbar-item {
    background: var(--win-gray);
    border-top: 2px solid var(--win-white);
    border-left: 2px solid var(--win-white);
    border-right: 2px solid var(--win-darker);
    border-bottom: 2px solid var(--win-darker);
    padding: 2px 6px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    height: 24px;
    max-width: 150px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .taskbar-item.active {
    border-top: 2px solid var(--win-darker);
    border-left: 2px solid var(--win-darker);
    border-right: 2px solid var(--win-white);
    border-bottom: 2px solid var(--win-white);
    background: #b0b0b0;
    font-weight: bold;
  }
  .taskbar-clock {
    margin-left: auto;
    border-top: 1px solid var(--win-darker);
    border-left: 1px solid var(--win-darker);
    border-right: 1px solid var(--win-white);
    border-bottom: 1px solid var(--win-white);
    padding: 2px 8px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 5px;
    height: 24px;
    background: var(--win-gray);
  }

  /* Start Menu */
  .start-menu {
    position: fixed; bottom: 30px; left: 3px;
    width: 180px;
    background: var(--win-gray);
    border-top: 2px solid var(--win-white);
    border-left: 2px solid var(--win-white);
    border-right: 2px solid var(--win-darker);
    border-bottom: 2px solid var(--win-darker);
    box-shadow: 2px 2px 0 #000;
    z-index: 10000;
    display: none;
  }
  .start-menu-side {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 24px;
    background: linear-gradient(to top, #0a246a, #3a6ea5);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 6px;
  }
  .start-menu-side span {
    color: silver;
    font-weight: bold;
    font-size: 14px;
    font-style: italic;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    letter-spacing: 1px;
  }
  .start-menu-side b { color: white; }
  .start-menu-items { margin-left: 24px; }
  .start-menu-item {
    padding: 6px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
  }
  .start-menu-item:hover {
    background: var(--win-blue);
    color: white;
  }
  .start-menu-item .sm-icon { width: 22px; height: 22px; flex-shrink: 0; }
  .start-menu-sep {
    border-top: 1px solid var(--win-dark);
    border-bottom: 1px solid var(--win-white);
    margin: 3px 24px 3px 32px;
  }

  /* Notepad content */
  .notepad-area {
    background: white;
    border-top: 1px solid var(--win-darker);
    border-left: 1px solid var(--win-darker);
    border-right: 1px solid var(--win-white);
    border-bottom: 1px solid var(--win-white);
    padding: 6px;
    font-family: 'Fixedsys', 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.5;
    color: #000;
    min-height: 200px;
    white-space: pre-wrap;
    overflow-y: auto;
    max-height: 400px;
  }

  /* Explorer content */
  .explorer-content {
    background: white;
    border-top: 1px solid var(--win-darker);
    border-left: 1px solid var(--win-darker);
    border-right: 1px solid var(--win-white);
    border-bottom: 1px solid var(--win-white);
    padding: 8px;
    min-height: 200px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 8px;
  }
  .file-item {
    text-align: center;
    cursor: pointer;
    padding: 4px;
  }
  .file-item:hover { background: #d0d0ff; }
  .file-item.selected { background: #0a246a; color: white; }
  .file-icon { width: 32px; height: 32px; margin: 0 auto 4px; image-rendering: pixelated; }
  .file-name { font-size: 11px; word-break: break-word; }

  /* About content */
  .about-content {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 8px;
  }
  .about-avatar {
    width: 72px; height: 72px;
    border-top: 2px solid var(--win-darker);
    border-left: 2px solid var(--win-darker);
    border-right: 2px solid var(--win-white);
    border-bottom: 2px solid var(--win-white);
    background: linear-gradient(135deg, #1a1a2e, #0a0a1f);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  .about-text {
    flex: 1;
    font-size: 11px;
    line-height: 1.7;
    color: #000;
  }
  .about-text b { color: var(--win-blue); }

  /* Group box */
  .group-box {
    border: 1px solid var(--win-dark);
    padding: 10px 8px 8px;
    margin: 6px 0;
    position: relative;
  }
  .group-box-title {
    position: absolute;
    top: -7px; left: 8px;
    background: var(--win-gray);
    padding: 0 4px;
    font-size: 11px;
    color: #000;
  }

  /* Skill bar */
  .skill-row { margin: 6px 0; }
  .skill-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 2px;
  }
  .skill-track {
    height: 14px;
    background: white;
    border-top: 1px solid var(--win-darker);
    border-left: 1px solid var(--win-darker);
    border-right: 1px solid var(--win-white);
    border-bottom: 1px solid var(--win-white);
    position: relative;
  }
  .skill-fill {
    height: 100%;
    background: linear-gradient(90deg, #0a246a, #3a6ea5);
    transition: width 1s ease;
    width: 0%;
  }

  /* Link list */
  .link-list { list-style: none; }
  .link-list li {
    padding: 4px 6px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 11px;
    color: #000;
  }
  .link-list li:hover {
    background: var(--win-blue);
    color: white;
  }
  .link-icon { width: 16px; height: 16px; flex-shrink: 0; image-rendering: pixelated; }

  /* Winamp */
  .winamp {
    background: #2a2a2a;
    color: #00ff00;
    font-family: 'VT323', monospace;
    padding: 6px;
  }
  .winamp-display {
    background: #000;
    border-top: 1px solid #111;
    border-left: 1px solid #111;
    border-right: 1px solid #555;
    border-bottom: 1px solid #555;
    padding: 6px;
    margin-bottom: 6px;
  }
  .winamp-track {
    color: #00ff00;
    font-size: 16px;
    white-space: nowrap;
    overflow: hidden;
  }
  .winamp-track span {
    display: inline-block;
    animation: marquee 10s linear infinite;
  }
  @keyframes marquee {
    0% { transform: translateX(200px); }
    100% { transform: translateX(-100%); }
  }
  .winamp-info {
    color: #00cc00;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    margin-top: 3px;
  }
  .winamp-bars {
    display: flex; gap: 2px; align-items: flex-end; height: 22px;
  }
  .winamp-bar {
    width: 4px;
    background: linear-gradient(to top, #00ff00, #ffff00, #ff0000);
    animation: barAnim 0.4s ease-in-out infinite alternate;
  }
  @keyframes barAnim { 0%{height:3px;} 100%{height:22px;} }
  .winamp-controls {
    display: flex; gap: 2px; justify-content: center;
  }
  .winamp-ctrl-btn {
    width: 26px; height: 20px;
    background: #3a3a3a;
    border-top: 1px solid #666;
    border-left: 1px solid #666;
    border-right: 1px solid #111;
    border-bottom: 1px solid #111;
    color: #ccc;
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .winamp-ctrl-btn:active {
    border-top: 1px solid #111;
    border-left: 1px solid #111;
    border-right: 1px solid #666;
    border-bottom: 1px solid #666;
  }

  /* Boot */
  .boot-screen {
    position: fixed; inset: 0;
    background: #000;
    z-index: 10001;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #aaa;
    font-family: 'VT323', monospace;
    font-size: 18px;
    transition: opacity 0.6s;
  }
  .boot-screen.hidden { opacity: 0; pointer-events: none; }
  .boot-logo {
    font-size: 32px;
    color: #fff;
    margin-bottom: 10px;
    font-family: 'Tahoma', sans-serif;
    font-weight: bold;
    text-align: center;
    line-height: 1.3;
  }
  .boot-logo .w2k { color: #3a6ea5; }
  .boot-progress {
    width: 280px; height: 18px;
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #c0c0c0;
    border-bottom: 2px solid #c0c0c0;
    background: #000;
    margin-top: 20px;
    padding: 2px;
  }
  .boot-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #0a246a, #3a6ea5);
    width: 0%;
    transition: width 0.15s;
  }
  .boot-text { margin-top: 10px; font-size: 14px; color: #0f0; }

  /* Shutdown */
  .shutdown-screen {
    position: fixed; inset: 0;
    background: #000;
    z-index: 10002;
    display: none;
    align-items: center;
    justify-content: center;
    color: #ff8800;
    font-family: 'Tahoma', sans-serif;
    font-size: 18px;
    text-align: center;
    line-height: 2;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 16px; height: 16px; }
  ::-webkit-scrollbar-track { background: var(--win-gray); }
  ::-webkit-scrollbar-thumb {
    background: var(--win-gray);
    border-top: 2px solid var(--win-white);
    border-left: 2px solid var(--win-white);
    border-right: 2px solid var(--win-darker);
    border-bottom: 2px solid var(--win-darker);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .window {
      position: fixed !important;
      left: 4px !important; right: 4px !important;
      top: 4px !important; bottom: 34px !important;
      width: auto !important; height: auto !important;
    }
    .desktop-icon { display: none; }
  }

  /* Blinking cursor for notepad */
  .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="crt"></div>

<!-- Boot Screen -->
<div class="boot-screen" id="bootScreen">
  <div class="boot-logo">
    <span class="w2k">Microsoft</span><br>
    Windows <span style="color:#fff;">2000</span><br>
    <span style="font-size:14px;color:#888;">Professional</span>
  </div>
  <div class="boot-progress"><div class="boot-progress-fill" id="bootProgress"></div></div>
  <div class="boot-text" id="bootText">Загрузка системы...</div>
</div>

<!-- Desktop -->
<div class="desktop" id="desktop">

  <!-- Desktop Icons -->
  <div class="desktop-icon" style="top:16px;left:16px;" ondblclick="openWindow('aboutWin')">
    <svg class="icon-img" viewBox="0 0 32 32"><rect x="3" y="5" width="26" height="18" fill="#c0c0c0" stroke="#000" stroke-width="1"/><rect x="5" y="7" width="22" height="14" fill="#0a246a"/><rect x="12" y="23" width="8" height="3" fill="#c0c0c0" stroke="#000" stroke-width="1"/><rect x="10" y="26" width="12" height="2" fill="#808080"/><text x="16" y="17" fill="#fff" font-size="9" text-anchor="middle" font-family="Tahoma" font-weight="bold"></text></svg>
    <div class="icon-label">Обо мне</div>
  </div>

  <div class="desktop-icon" style="top:110px;left:16px;" ondblclick="openWindow('notepadWin')">
    <svg class="icon-img" viewBox="0 0 32 32"><rect x="6" y="3" width="20" height="26" fill="#fff" stroke="#000" stroke-width="1"/><rect x="9" y="7" width="14" height="1" fill="#000"/><rect x="9" y="10" width="14" height="1" fill="#000"/><rect x="9" y="13" width="14" height="1" fill="#000"/><rect x="9" y="16" width="10" height="1" fill="#000"/><rect x="9" y="19" width="12" height="1" fill="#000"/><rect x="9" y="22" width="8" height="1" fill="#000"/></svg>
    <div class="icon-label">bio.txt</div>
  </div>

  <div class="desktop-icon" style="top:204px;left:16px;" ondblclick="openWindow('explorerWin')">
    <svg class="icon-img" viewBox="0 0 32 32"><path d="M4 8h10l3 3h11v14H4z" fill="#ffcc00" stroke="#000" stroke-width="1"/><path d="M4 12h24v13H4z" fill="#ffee88" stroke="#000" stroke-width="1"/></svg>
    <div class="icon-label">Проекты</div>
