<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Чат — @feluve</title>
  <meta name="description" content="Интерактивный чат — жидкое стекло, анимация печати" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    :root{
      --glass-bg: rgba(255,255,255,0.04);
      --accent-1: #7c5cff;
      --accent-2: #2ea1e9;
      --text: #e6eef6;
      --muted: #9aa4b2;
      --bubble-user: rgba(124,92,255,0.14);
      --bubble-me: rgba(46,161,233,0.12);
      --radius: 16px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg,#071026 0%, #0b1424 60%);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
    }

    .wrap{
      width:100%;
      max-width:920px;
    }

    .card{
      border-radius:24px;
      padding:20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border:1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(18px) saturate(120%);
      -webkit-backdrop-filter: blur(18px) saturate(120%);
      box-shadow: 0 10px 40px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
      overflow:hidden;
    }

    .header{
      display:flex;
      gap:12px;
      align-items:center;
      padding:18px 20px;
      border-bottom:1px solid rgba(255,255,255,0.03);
    }

    .header .title{
      font-weight:700;
      font-size:18px;
      letter-spacing:-0.3px;
    }

    .chat-area{
      height:66vh;
      min-height:480px;
      overflow:auto;
      padding:24px;
      display:flex;
      flex-direction:column;
      gap:12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.01), transparent 40%);
    }

    .msg{
      max-width:72%;
      padding:12px 14px;
      border-radius:14px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border:1px solid rgba(255,255,255,0.03);
      animation: popIn .18s ease-out;
      box-shadow: 0 8px 20px rgba(2,6,23,0.6);
      word-break:break-word;
      font-size:15px;
      line-height:1.5;
    }

    @keyframes popIn{
      from{ transform: translateY(6px) scale(.995); opacity:0 }
      to{ transform: translateY(0) scale(1); opacity:1 }
    }

    .msg.user{
      align-self:flex-start;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(124,92,255,0.02));
      border-radius:14px 14px 14px 6px;
      color:var(--text);
      border:1px solid rgba(124,92,255,0.12);
    }

    .msg.me{
      align-self:flex-end;
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(46,161,233,0.03));
      border-radius:14px 14px 6px 14px;
      color:var(--text);
      border:1px solid rgba(46,161,233,0.08);
    }

    .typing-indicator{
      width:70px;
      height:34px;
      display:flex;
      gap:6px;
      align-items:center;
      justify-content:center;
      padding:8px;
      border-radius:16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border:1px solid rgba(255,255,255,0.03);
      opacity:0.95;
      transform-origin:left center;
    }

    .dot{
      width:6px;
      height:6px;
      background:rgba(255,255,255,0.7);
      border-radius:50%;
      opacity:0.8;
      animation: dot 1s infinite ease-in-out;
    }
    .dot:nth-child(2){ animation-delay: 0.15s }
    .dot:nth-child(3){ animation-delay: 0.3s }
    @keyframes dot{ 0%{ transform: translateY(0); opacity:.6 } 50%{ transform: translateY(-6px); opacity:1 } 100%{ transform: translateY(0); opacity:.6 } }

    .input-bar{
      display:flex;
      gap:12px;
      align-items:center;
      padding:16px;
      border-top:1px solid rgba(255,255,255,0.03);
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
    }

    .input{
      flex:1;
      display:flex;
      gap:12px;
      align-items:center;
      padding:10px 12px;
      border-radius:12px;
      background: rgba(255,255,255,0.02);
      border:1px solid rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .input input{
      border:0;
      outline:0;
      background:transparent;
      color:var(--text);
      width:100%;
      font-size:15px;
    }

    .send-btn{
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      color:white;
      padding:10px 16px;
      border-radius:12px;
      border: none;
      cursor:pointer;
      font-weight:600;
      box-shadow: 0 8px 24px rgba(124,92,255,0.18);
      transition: transform .16s ease; 
    }
    .send-btn:active{ transform: translateY(2px) }

    /* Liquid highlight for new message */
    .msg.me::after{
      content:'';
      position:absolute;
      width:120px;
      height:120px;
      border-radius:50%;
      right:-40px;
      bottom:-40px;
      background: radial-gradient(circle at 30% 30%, rgba(46,161,233,0.12), transparent 40%);
      filter: blur(18px);
      pointer-events:none;
      opacity:0.8;
    }

    /* smooth scroll placeholder */
    .chat-area::-webkit-scrollbar{ width:8px }
    .chat-area::-webkit-scrollbar-thumb{ background: rgba(255,255,255,0.04); border-radius:8px }

    .hint{
      color:var(--muted);
      font-size:13px;
      padding:8px 20px 12px 20px;
    }

    .me-bubble-anim{
      transform-origin: right center;
      animation: floatUp .5s cubic-bezier(.2,.9,.3,1);
    }
    @keyframes floatUp{ from{ transform: translateY(10px) scale(.98); opacity:0 } to{ transform: translateY(0) scale(1); opacity:1 } }

  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <div style="flex:1">
          <div class="title">Чат — Жидкое стекло</div>
          <div class="hint">Печатайте в поле. Видно анимацию печати и плавное появление сообщений.</div>
        </div>
        <div style="opacity:.9; font-size:13px">@feluve</div>
      </div>

      <div id="chat" class="chat-area" aria-live="polite"></div>

      <div class="input-bar">
        <div class="input">
          <input id="textInput" type="text" placeholder="Напишите сообщение..." aria-label="Сообщение">
        </div>
        <button id="sendBtn" class="send-btn">Отправить</button>
      </div>
    </div>
  </div>

  <template id="tplMe">
    <div class="msg me me-bubble-anim"></div>
  </template>
  <template id="tplUser">
    <div class="msg user"></div>
  </template>
  <template id="tplTyping">
    <div class="typing-indicator user" aria-hidden="true">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </template>

  <script>
    // Simple interactive chat behavior: show typing indicator while user is typing, animate message on send.
    const input = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const chat = document.getElementById('chat');
    const tplMe = document.getElementById('tplMe').content;
    const tplUser = document.getElementById('tplUser').content;
    const tplTyping = document.getElementById('tplTyping').content;

    let typingNode = null;
    let typingTimeout = null;

    function showTyping(){
      if(typingNode) return;
      typingNode = tplTyping.cloneNode(true);
      chat.appendChild(typingNode);
      chat.scrollTop = chat.scrollHeight;
    }
    function hideTyping(){
      if(!typingNode) return;
      chat.removeChild(typingNode);
      typingNode = null;
    }

    input.addEventListener('input', () => {
      // show typing while user types; hide 800ms after stop
      showTyping();
      if(typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(()=>{
        hideTyping();
      }, 800);
    });

    function appendMessage(text, who='me'){
      hideTyping();
      const tpl = who === 'me' ? tplMe : tplUser;
      const node = tpl.cloneNode(true).querySelector('.msg');
      node.textContent = text;
      chat.appendChild(node.parentElement ? node.parentElement : node);
      // ensure class addition and animation
      node.classList.add(who === 'me' ? 'me' : 'user');
      // scroll into view
      chat.scrollTop = chat.scrollHeight + 200;
    }

    sendBtn.addEventListener('click', () => {
      const v = input.value.trim();
      if(!v) return;
      // emulate a short typing delay and then append
      appendMessage(v, 'me');
      input.value = '';
      // small reply simulation
      setTimeout(()=>{
        appendMessage('Принял: '+v, 'user');
      }, 700 + Math.random()*600);
    });

    input.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        sendBtn.click();
      }
    });

    // initial welcome
    setTimeout(()=>{
      appendMessage('Привет! Это демонстрация чата с эффектом "жидкого стекла". Напишите что-нибудь.', 'user');
    }, 400);
  </script>
</body>
</html>
